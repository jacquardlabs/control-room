<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>control-room</title>
<style>
  /*
    Instrument panel, two shifts of daylight.

    Two type registers, one job each: PLACARD (condensed uppercase sans,
    wide-tracked) is engraved-bezel labeling -- it never changes, it names
    what a readout means. READOUT (monospace, tabular-nums) is the digital
    display itself -- it's the thing that moves. Real panels keep these
    visually distinct; so does this one.
  */
  :root {
    --void: #f1f2ee;
    --bezel: #ffffff;
    --bezel-hi: #ffffff;
    --bezel-edge: #c9cdc4;
    --bezel-sunk: #e6e8e2;
    --phosphor: #14181a;
    --steel: #5b6560;
    --steel-hi: #ffffff;
    --focus: #0b5fff;

    --grinding: #0b5fff;
    --grinding-ink: #0a3d9e;
    --amber: #9c6a05;
    --amber-lamp: #eda210;
    --amber-bg: #fbecd2;
    --on-amber: #241800;
    --review: #56605a;
    --review-bg: #eceee8;
    --died: #b3261e;
    --died-bg: #fbe6e4;
    --done: #1c7a3e;
    --done-bg: #e6f3e9;

    --tab-bg: #e6e8e2;
    --tab-selected: var(--bezel);
    --live-dot: #1c7a3e;
    --stalled-dot: var(--phosphor);
    --connecting-dot: #a3a99e;

    --placard: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    --readout: ui-monospace, "SF Mono", "Cascadia Code", Menlo, Consolas, monospace;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --void: #0a0d0e;
      --bezel: #15191a;
      --bezel-hi: #1c2122;
      --bezel-edge: #2a302f;
      --bezel-sunk: #0d1112;
      --phosphor: #e7ece7;
      --steel: #7c8a83;
      --steel-hi: #cfd8d1;
      --focus: #5aa2ff;

      --grinding: #4fb3ff;
      --grinding-ink: #bfe3ff;
      --amber: #ffb200;
      --amber-lamp: #ffb200;
      --amber-bg: #2e2205;
      --on-amber: #201700;
      --review: #b8c2ba;
      --review-bg: #1c2120;
      --died: #ff453a;
      --died-bg: #2c1210;
      --done: #34d399;
      --done-bg: #0f2417;

      --tab-bg: #14181a;
      --tab-selected: var(--bezel);
      --live-dot: #34d399;
      --stalled-dot: var(--phosphor);
      --connecting-dot: #4a5350;
    }
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--void);
    color: var(--phosphor);
    font-family: var(--readout);
    font-variant-numeric: tabular-nums;
  }

  body { min-height: 100vh; display: flex; flex-direction: column; }

  a, button { font: inherit; color: inherit; }

  :focus-visible {
    outline: 2px solid var(--focus);
    outline-offset: 2px;
    border-radius: 2px;
  }

  .placard {
    font-family: var(--placard);
    text-transform: uppercase;
    letter-spacing: 0.12em;
    font-weight: 600;
    font-size: 0.62rem;
    color: var(--steel);
  }

  /* ---------- The wall: one instrument strip, bezel-divided cells ---------- */

  .wall {
    display: flex;
    align-items: stretch;
    flex-wrap: wrap;
    background: var(--bezel);
    border-bottom: 1px solid var(--bezel-edge);
    box-shadow: 0 1px 0 rgba(0, 0, 0, 0.03);
  }

  .plate {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0 1.1rem;
    border-right: 1px solid var(--bezel-edge);
    background: var(--bezel-sunk);
  }
  .plate-mark {
    font-size: 1rem;
    color: var(--grinding);
    line-height: 1;
  }
  .plate-name {
    font-family: var(--placard);
    font-weight: 700;
    letter-spacing: 0.16em;
    font-size: 0.72rem;
    white-space: nowrap;
  }

  .wall-cell {
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 0.2rem;
    padding: 0.55rem 1.15rem;
    border-right: 1px solid var(--bezel-edge);
    min-width: 0;
  }

  .count { display: inline-flex; align-items: baseline; }
  .count-value { font-size: 1.5rem; font-weight: 600; line-height: 1; }
  .count-n .count-value { color: var(--grinding-ink); }
  .count-r .count-value { color: var(--review); }
  .count-m .count-value { color: var(--amber); }

  /* Grows to absorb whatever width the fixed-size cells before it don't
     use, so the strip's own border-right divisions reach the liveness
     indicator cleanly on a wide monitor instead of leaving a floating gap
     of bare bezel between the last populated cell and the pinned-right
     liveness readout. */
  .cell-burn { min-width: 8.5rem; flex: 1 1 auto; }
  .wall-burn { font-size: 1.05rem; font-weight: 600; white-space: nowrap; }

  /* MASTER CAUTION -- the one signature, the one thing DESIGN.md lets move.
     A real annunciator: a lamp lens plus a placard face, off (dim steel) or
     lit (amber field with an actual radial glow), never a flat status pill. */
  .master-caution {
    appearance: none;
    display: inline-flex;
    align-items: center;
    gap: 0.65rem;
    margin: 0.5rem 0.9rem;
    padding: 0.4rem 1rem 0.4rem 0.7rem;
    border: 1px solid var(--bezel-edge);
    border-radius: 4px;
    background: linear-gradient(180deg, var(--bezel-hi), var(--bezel));
    color: var(--steel);
    cursor: pointer;
    box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.25), 0 1px 1px rgba(0, 0, 0, 0.15);
  }

  .mc-lamp {
    width: 0.9rem;
    height: 0.9rem;
    border-radius: 50%;
    flex: none;
    background: radial-gradient(circle at 32% 28%, var(--steel-hi), var(--bezel-edge) 75%);
    box-shadow: inset 0 0 0 1px rgba(0, 0, 0, 0.25);
  }

  .mc-label {
    font-family: var(--placard);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    font-weight: 700;
    font-size: 0.78rem;
  }

  .mc-count {
    font-family: var(--readout);
    font-size: 0.95rem;
    font-weight: 700;
  }

  /* Two fully-opaque frames, never a fade through transparency -- real
     annunciator hardware switches, it doesn't dissolve; that also sidesteps
     any light-on-light/dark-on-dark contrast dip mid-blink in either theme. */
  .master-caution.blink {
    border-color: var(--amber-lamp);
    animation: caution-blink 1s steps(1, end) infinite;
  }
  .master-caution.blink .mc-lamp {
    background: radial-gradient(circle at 32% 28%, #fff3d6, var(--amber-lamp) 60%, #7a4b00 100%);
    box-shadow: 0 0 8px 2px rgba(237, 162, 16, 0.65), inset 0 0 0 1px rgba(0, 0, 0, 0.3);
  }

  @keyframes caution-blink {
    0%, 49% {
      background: linear-gradient(180deg, var(--amber-lamp), var(--amber));
      color: var(--on-amber);
    }
    50%, 100% {
      background: linear-gradient(180deg, var(--bezel-hi), var(--bezel));
      color: var(--steel);
    }
  }

  @media (prefers-reduced-motion: reduce) {
    .master-caution.blink {
      animation: none;
      background: linear-gradient(180deg, var(--amber-lamp), var(--amber));
      color: var(--on-amber);
    }
  }

  .liveness {
    margin-left: auto;
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0 1.1rem;
    color: var(--steel);
    font-size: 0.78rem;
    border-left: 1px solid var(--bezel-edge);
  }

  .liveness-dot {
    width: 0.55rem;
    height: 0.55rem;
    border-radius: 50%;
    background: var(--connecting-dot);
    flex: none;
  }

  .liveness[data-state="live"] .liveness-dot { background: var(--live-dot); }
  /* Static, not pulsing: DESIGN.md reserves repeated motion for MASTER
     CAUTION alone. "Stalled" is carried by the dot's fixed neutral fill,
     bold weight, and the literal text below -- never a second animated
     signal competing with the one the whole product reserves motion for. */
  .liveness[data-state="stalled"] .liveness-dot { background: var(--stalled-dot); }
  .liveness[data-state="stalled"] { color: var(--phosphor); font-weight: 600; }

  /* ---------- Tabs: labeled channel selectors, not browser tabs ---------- */

  .tabbar {
    display: flex;
    gap: 2px;
    overflow-x: auto;
    padding: 0.6rem 0.8rem 0;
    background: var(--void);
  }

  .tab {
    appearance: none;
    border: 1px solid var(--bezel-edge);
    border-bottom: none;
    border-radius: 3px 3px 0 0;
    background: var(--tab-bg);
    color: var(--phosphor);
    padding: 0.5rem 0.85rem;
    display: inline-flex;
    align-items: center;
    gap: 0.55rem;
    cursor: pointer;
    white-space: nowrap;
  }

  .tab[aria-selected="true"] {
    background: var(--tab-selected);
    box-shadow: inset 0 2px 0 var(--grinding);
  }

  .tab-lamp {
    font-size: 0.7rem;
    width: 1em;
    text-align: center;
  }
  .tab[data-state="grinding"] .tab-lamp { color: var(--grinding); }
  .tab[data-state="input-blocked"] .tab-lamp,
  .tab[data-state="question-pending"] .tab-lamp,
  .tab[data-state="parked"] .tab-lamp { color: var(--amber); }
  .tab[data-state="review-ready"] .tab-lamp { color: var(--review); }
  .tab[data-state="died"] .tab-lamp { color: var(--died); }
  .tab[data-state="done"] .tab-lamp { color: var(--done); }

  .tab-label { font-weight: 600; }

  .tab-state-text {
    font-family: var(--placard);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    font-size: 0.62rem;
    color: var(--steel);
  }

  .tab-burn { font-size: 0.72rem; color: var(--steel); }
  .tab-burn:empty { display: none; }

  /* Discovery's own liveness bookkeeping is a different axis from the
     attention taxonomy above -- see control_room.attention.liveness.
     `died` is excluded from dimming: DESIGN.md's anti-pattern list names
     "softening died" directly, and it stays at `grace` forever by design
     (the "never disappearing while amber" protection), so without this
     exclusion the one state DESIGN.md is most emphatic about keeping
     undimmed would be the one state that's always dimmed. */
  .tab[data-live-state="grace"]:not([data-state="died"]) { opacity: 0.55; }

  /* ---------- Panels ---------- */

  main {
    flex: 1;
    padding: 1.1rem;
    border-top: 1px solid var(--bezel-edge);
    background: var(--tab-selected);
    overflow: auto;
  }

  .panel[hidden] { display: none; }

  #empty-state {
    color: var(--steel);
    font-family: var(--placard);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    font-size: 0.75rem;
  }

  /* ---------- The board fragment (control_room.board.render output) ----------
     Server-rendered; this page only supplies the panel-mounted styling. */

  .board { display: flex; flex-direction: column; gap: 0.85rem; }

  .board .cas {
    list-style: none;
    margin: 0;
    padding: 0;
    display: flex;
    flex-direction: column;
    gap: 2px;
    font-size: 0.82rem;
  }
  .board .cas-line {
    padding: 0.35rem 0.6rem;
    border-left: 3px solid transparent;
  }
  .board .cas-M { color: var(--amber); font-weight: 600; background: var(--amber-bg); border-left-color: var(--amber); }
  .board .cas-N, .board .cas-none { color: var(--steel); }
  .board .cas-R { color: var(--review); background: var(--review-bg); border-left-color: var(--review); }

  .board .instruments { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: 0.5rem; }
  .board .instrument {
    border: 1px solid var(--bezel-edge);
    border-radius: 3px;
    padding: 0.6rem 0.85rem;
    display: flex;
    flex-wrap: wrap;
    align-items: baseline;
    gap: 0.5rem 0.9rem;
    background: var(--bezel);
  }
  .board .instrument.state-grinding { border-left: 3px solid var(--grinding); }
  .board .instrument.state-input-blocked,
  .board .instrument.state-question-pending,
  .board .instrument.state-parked { border-left: 3px solid var(--amber); background: var(--amber-bg); }
  .board .instrument.state-review-ready { border-left: 3px solid var(--review); background: var(--review-bg); }
  .board .instrument.state-died { border-left: 3px solid var(--died); background: var(--died-bg); }
  .board .instrument.state-done { border-left: 3px solid var(--done); background: var(--done-bg); }

  .board .lamp { font-size: 0.85rem; }
  .board .lamp-fix {
    font-family: var(--placard);
    font-size: 0.6rem;
    letter-spacing: 0.06em;
    color: var(--steel);
  }
  .board .label { font-weight: 600; }
  .board .state-text {
    font-family: var(--placard);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    font-size: 0.65rem;
    color: var(--steel);
  }

  .board .reason, .board .blocked-on, .board .resolution-command {
    flex-basis: 100%;
    margin: 0;
    color: var(--steel);
    font-size: 0.85rem;
  }
  .board .resolution-command code {
    background: var(--bezel-sunk);
    padding: 0.15rem 0.4rem;
    border-radius: 2px;
  }
  .board .protocol-degraded {
    color: var(--amber);
    font-weight: 600;
  }
  .board .fix-budget { display: inline-flex; gap: 0.2rem; }
  .board .wedge { width: 0.6rem; height: 0.6rem; border-radius: 1px; display: inline-block; border: 1px solid var(--amber-lamp); }
  .board .wedge-filled { background: var(--amber-lamp); }

  /* This board fragment's own MASTER CAUTION renders too, deliberately not
     suppressed: it answers "does *this one stream* need you," distinct
     from the wall's fleet-wide button -- a multi-instrument protocol board
     can have its own caution state independent of the rest of the fleet.
     Scaled down from the wall's own version, same lamp language. */
  .board .master-caution { margin: 0.1rem 0; padding: 0.35rem 0.8rem 0.35rem 0.6rem; }
</style>
</head>
<body>
  <header class="wall" aria-label="Fleet wall">
    <div class="plate">
      <span class="plate-mark" aria-hidden="true">&#9679;</span>
      <span class="plate-name">Control Room</span>
    </div>

    <div class="wall-cell">
      <span class="placard">Grinding</span>
      <span class="count count-n"><span class="count-value" id="count-grinding">0</span></span>
    </div>
    <div class="wall-cell">
      <span class="placard">Review-ready</span>
      <span class="count count-r"><span class="count-value" id="count-review">0</span></span>
    </div>
    <div class="wall-cell">
      <span class="placard">Need you</span>
      <span class="count count-m" aria-live="polite"><span class="count-value" id="count-need-you">0</span></span>
    </div>

    <!-- A real, focusable button (DESIGN.md: "gauges and caution are real
         buttons"). Acknowledges every currently-need-you stream at once
         (POST /ack with no body); a single tab's own board carries the
         matching per-tab affordance. Never mutates the DOM itself on
         click: the next SSE frame is what actually reflects the ack --
         server truth only, never client-invented state. -->
    <button type="button" id="master-caution" class="master-caution" aria-pressed="false" aria-label="MASTER CAUTION">
      <span class="mc-lamp" aria-hidden="true"></span>
      <span class="mc-label">Master Caution</span>
      <span class="mc-count" id="caution-count">0</span>
    </button>

    <div class="wall-cell cell-burn">
      <span class="placard">Burn today</span>
      <span class="wall-burn" id="burn-value">not yet tracked</span>
    </div>

    <div class="liveness" id="liveness" data-state="connecting" role="status">
      <span class="liveness-dot" aria-hidden="true"></span>
      <span id="liveness-text">connecting&hellip;</span>
    </div>
  </header>

  <nav class="tabbar" role="tablist" aria-label="Streams" id="tabbar"></nav>

  <main id="panels">
    <p id="empty-state">No streams discovered yet.</p>
  </main>

  <script>
  (function () {
    "use strict";

    var tabbar = document.getElementById("tabbar");
    var panels = document.getElementById("panels");
    var emptyState = document.getElementById("empty-state");
    var liveness = document.getElementById("liveness");
    var livenessText = document.getElementById("liveness-text");
    var masterCaution = document.getElementById("master-caution");
    var cautionCount = document.getElementById("caution-count");

    var selectedId = null;
    var lastMessageAt = null;
    var connectionErrored = false;
    var pollIntervalSeconds = 3;

    function idAttr(prefix, streamId) {
      // Stream ids look like "interactive:abc" or "job:xyz" -- safe as an
      // HTML id/attribute value as-is (colons are legal there); this helper
      // exists purely to keep the prefixing consistent, not to escape
      // anything (DOM lookups below use getElementById, never a raw CSS
      // selector, so ":" never needs CSS escaping).
      return prefix + "__" + streamId;
    }

    function lampGlyph(bucket) {
      return bucket === "M" ? "●" : "○";
    }

    // Pure, DOM-independent: DESIGN.md's "burn always with units against
    // context" applied to one stream's own cumulative cost -- "" (not a
    // placeholder string) when the server hasn't resolved a number yet for
    // this stream this tick, per `.tab-burn:empty`'s own CSS rule right
    // above (the common per-tick case for a stream still resolving, not
    // the "feature doesn't exist" case the wall's own "not yet tracked"
    // text names).
    function formatBurn(usd) {
      return usd === null || usd === undefined ? "" : "$" + usd.toFixed(2) + " session";
    }

    // The seven-state-attention-to-N/R/M-bucket mapping is owned once, server
    // side, by control_room.board.bucket.wall_bucket (epic pre-mortem #3:
    // duplicating this mapping here was a named drift risk) -- every stream
    // payload already carries its resolved `bucket`, so this page never
    // re-derives the mapping from `attention_state` itself.

    function render(payload) {
      document.getElementById("count-grinding").textContent = payload.wall.grinding;
      document.getElementById("count-review").textContent = payload.wall.review_ready;
      document.getElementById("count-need-you").textContent = payload.wall.need_you;
      cautionCount.textContent = payload.wall.unacknowledged_need_you;
      masterCaution.classList.toggle("blink", payload.wall.master_caution);
      masterCaution.setAttribute("aria-pressed", String(payload.wall.unacknowledged_need_you === 0));
      masterCaution.setAttribute(
        "aria-label",
        payload.wall.master_caution
          ? "MASTER CAUTION -- " + payload.wall.unacknowledged_need_you + " need you"
          : "MASTER CAUTION"
      );

      document.getElementById("burn-value").textContent =
        payload.wall.aggregate_burn_usd === null
          ? "not yet tracked"
          : "$" + payload.wall.aggregate_burn_usd.toFixed(2) + " today";

      pollIntervalSeconds = payload.poll_interval_seconds || pollIntervalSeconds;
      reconcileTabs(payload.streams);
    }

    function reconcileTabs(streams) {
      var seenIds = {};
      streams.forEach(function (stream) {
        seenIds[stream.id] = true;
        upsertTab(stream);
      });

      // Remove tabs/panels for streams that vanished this tick (aged out).
      Array.prototype.slice.call(tabbar.children).forEach(function (tab) {
        var id = tab.dataset.streamId;
        if (!seenIds[id]) {
          tab.remove();
          var panel = document.getElementById(idAttr("panel", id));
          if (panel) panel.remove();
        }
      });

      emptyState.hidden = streams.length > 0;

      if (selectedId === null || !seenIds[selectedId]) {
        selectedId = streams.length > 0 ? streams[0].id : null;
      }
      applySelection();
    }

    function upsertTab(stream) {
      var tabId = idAttr("tab", stream.id);
      var panelId = idAttr("panel", stream.id);
      var tab = document.getElementById(tabId);
      var bucket = stream.bucket;

      if (!tab) {
        tab = document.createElement("button");
        tab.type = "button";
        tab.id = tabId;
        tab.className = "tab";
        tab.setAttribute("role", "tab");
        tab.setAttribute("aria-controls", panelId);
        tab.dataset.streamId = stream.id;
        tab.innerHTML = '<span class="tab-lamp" aria-hidden="true"></span>' +
          '<span class="tab-label"></span>' +
          '<span class="tab-state-text"></span>' +
          '<span class="tab-burn"></span>';
        tab.addEventListener("click", function () { selectTab(stream.id); });
        tab.addEventListener("keydown", onTabKeydown);
        tabbar.appendChild(tab);

        var panel = document.createElement("section");
        panel.id = panelId;
        panel.className = "panel";
        panel.setAttribute("role", "tabpanel");
        panel.setAttribute("aria-labelledby", tabId);
        panel.setAttribute("tabindex", "0");
        panel.hidden = true;
        panels.appendChild(panel);
      }

      tab.dataset.state = stream.attention_state;
      tab.dataset.liveState = stream.live_state;
      tab.querySelector(".tab-lamp").textContent = lampGlyph(bucket);
      tab.querySelector(".tab-label").textContent = stream.label;
      tab.querySelector(".tab-state-text").textContent = stream.attention_state;
      tab.querySelector(".tab-burn").textContent = formatBurn(stream.burn_usd);

      var panel = document.getElementById(panelId);
      // Skip the DOM write when this tick's board_html is byte-identical to
      // what's already rendered. A tick fires every poll interval whether
      // or not any given stream actually changed, so an unconditional
      // innerHTML rewrite here churned the DOM (and dropped any
      // in-progress focus/selection/scroll position inside the panel) on
      // every single tick, for every stream, changed or not -- including
      // hidden panels nobody is looking at. A stream whose board_html DID
      // change still gets fresh markup the moment this tick sees it,
      // whether or not its tab happens to be selected right now, so
      // switching tabs still never shows stale content.
      if (panel._lastBoardHtml !== stream.board_html) {
        panel._lastBoardHtml = stream.board_html;
        panel.innerHTML = stream.board_html;
      }
    }

    function applySelection() {
      Array.prototype.slice.call(tabbar.children).forEach(function (tab) {
        var isSelected = tab.dataset.streamId === selectedId;
        tab.setAttribute("aria-selected", String(isSelected));
        tab.tabIndex = isSelected ? 0 : -1;
        var panel = document.getElementById(idAttr("panel", tab.dataset.streamId));
        if (panel) panel.hidden = !isSelected;
      });
    }

    function selectTab(streamId) {
      selectedId = streamId;
      applySelection();
      var tab = document.getElementById(idAttr("tab", streamId));
      if (tab) tab.focus();
    }

    // Acknowledge: POST /ack and let the next SSE frame reflect it -- never
    // toggle any class/attribute here ourselves. `streamId` omitted acks
    // every currently-need-you stream at once (the wall's own MASTER
    // CAUTION button); a network hiccup is swallowed on purpose -- the
    // blink just keeps blinking until the owner tries again or a later
    // frame catches up, never a page-level error over a best-effort action.
    function postAck(streamId) {
      var init = { method: "POST" };
      if (streamId) {
        init.headers = { "Content-Type": "application/json" };
        init.body = JSON.stringify({ stream_id: streamId });
      }
      fetch("/ack", init).catch(function () {});
    }

    masterCaution.addEventListener("click", function () {
      postAck(null);
    });

    // One delegated listener covers every board's own per-tab MASTER
    // CAUTION button (`control_room.board.render`'s markup), present and
    // future -- boards are replaced wholesale on every `board_html` change
    // (see `upsertTab`), so a per-button listener would need re-attaching
    // on every single re-render; delegation on the stable `#panels`
    // container never does.
    panels.addEventListener("click", function (event) {
      var button = event.target.closest(".board .master-caution");
      if (!button) return;
      var section = button.closest(".board[data-stream-id]");
      if (!section) return;
      postAck(section.dataset.streamId);
    });

    // Pure, DOM-independent: which tab index a keyboard key moves focus to,
    // given the currently-focused index and the tab count. `null` means
    // "not a navigation key" -- extracted out of `onTabKeydown` (which
    // still does exactly this, calling straight through) so it's testable
    // without a DOM (see tests/test_shell_static_page_js.py).
    function nextTabIndex(key, index, count) {
      if (key === "ArrowRight") return (index + 1) % count;
      if (key === "ArrowLeft") return (index - 1 + count) % count;
      if (key === "Home") return 0;
      if (key === "End") return count - 1;
      return null;
    }

    function onTabKeydown(event) {
      var tabs = Array.prototype.slice.call(tabbar.children);
      var index = tabs.indexOf(event.currentTarget);
      if (index === -1) return;

      if (event.key === "Enter" || event.key === " ") {
        selectTab(event.currentTarget.dataset.streamId);
        event.preventDefault();
        return;
      }

      var nextIndex = nextTabIndex(event.key, index, tabs.length);
      if (nextIndex === null) return;

      event.preventDefault();
      selectTab(tabs[nextIndex].dataset.streamId);
    }

    // Pure, DOM-independent: given how long it's been since the last frame,
    // the server's own tick cadence, and whether the transport itself
    // errored, decide the liveness state/text pair -- extracted out of
    // `updateLiveness` (which still does exactly this, calling straight
    // through) so it's testable without a DOM (see
    // tests/test_shell_static_page_js.py).
    function classifyLiveness(elapsedSeconds, staleThreshold, connectionErrored) {
      if (connectionErrored || elapsedSeconds > staleThreshold) {
        return {
          state: "stalled",
          text: "server not responding — last update " + Math.round(elapsedSeconds) + "s ago",
        };
      }
      return { state: "live", text: "updated " + Math.round(elapsedSeconds) + "s ago" };
    }

    function updateLiveness() {
      if (lastMessageAt === null) {
        liveness.dataset.state = connectionErrored ? "stalled" : "connecting";
        livenessText.textContent = connectionErrored ? "server not responding" : "connecting…";
        return;
      }
      var elapsedSeconds = (Date.now() - lastMessageAt) / 1000;
      var staleThreshold = Math.max(pollIntervalSeconds * 3, 5);
      var classified = classifyLiveness(elapsedSeconds, staleThreshold, connectionErrored);
      liveness.dataset.state = classified.state;
      livenessText.textContent = classified.text;
    }

    setInterval(updateLiveness, 1000);
    updateLiveness();

    if (typeof EventSource === "undefined") {
      livenessText.textContent = "this browser can't stream live updates";
      liveness.dataset.state = "stalled";
    } else {
      var source = new EventSource("/events");
      source.onmessage = function (event) {
        // A malformed or unexpected frame must not silently read as a
        // healthy connection -- the same "uncertainty never reads as fine"
        // instinct DESIGN.md applies to attention state applies here to
        // liveness: catch, report through the existing stalled path, and
        // leave `lastMessageAt` alone rather than marking a broken tick as
        // the moment of last successful update.
        try {
          render(JSON.parse(event.data));
        } catch {
          connectionErrored = true;
          updateLiveness();
          return;
        }
        lastMessageAt = Date.now();
        connectionErrored = false;
        updateLiveness();
      };
      source.onerror = function () {
        connectionErrored = true;
        updateLiveness();
      };
    }
  })();
  </script>
</body>
</html>
